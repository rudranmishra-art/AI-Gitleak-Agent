# config/gitleaks.toml
# Custom Gitleaks rules for AI-Gitleak-Agent
# See: https://github.com/gitleaks/gitleaks#configuration

title = "AI-Gitleak-Agent Custom Rules"

[extend]
# Extend the default Gitleaks ruleset
useDefault = true

# ── Extra rules not in the default set ────────────────────────────────────────

[[rules]]
id          = "azure-ad-client-secret-v2"
description = "Azure AD Client Secret (extended pattern)"
regex       = '''(?i)(azure[_\-\s]?(client[_\-\s]?secret|secret)[_\-\s]?[:=][_\-\s]?)([a-zA-Z0-9~._-]{34,40})'''
secretGroup = 3
entropy     = 3.5
tags        = ["azure", "cloud"]

[[rules]]
id          = "generic-password-assignment"
description = "Generic password variable assignment"
regex       = '''(?i)(password|passwd|pwd)\s*[:=]\s*['\"]([^'\"]{8,})['\"]\s*$'''
secretGroup = 2
entropy     = 3.0
tags        = ["generic"]

# ── Path allowlists (never flag these) ─────────────────────────────────────────

[allowlist]
description = "Global allow list"
paths       = [
  '''\.md$''',
  '''\.txt$''',
  '''tests/fixtures/''',
  '''testdata/''',
]
commits = []
